<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务状态</title>
  <style>
    @import url("https://cdn.jsdelivr.net/npm/fontsource-noto-sans-sc@4.0.0/chinese-simplified.css");
    @import url("https://cdn.jsdelivr.net/npm/fontsource-noto-sans-sc@4.0.0/latin.css");

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #071018;
      --panel: rgba(12, 18, 30, 0.82);
      --panel-2: rgba(17, 24, 39, 0.92);
      --border: rgba(255,255,255,0.08);
      --text: #e5edf6;
      --muted: #8ea0b8;
      --accent: #f97316;
      --accent-soft: #fdba74;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --shadow: 0 24px 60px rgba(0,0,0,0.32);
    }

    body {
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(249,115,22,0.22), transparent 36%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.08), transparent 26%),
        linear-gradient(180deg, #060a10 0%, #09111d 44%, #0c1422 100%);
    }

    .shell {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      padding: 22px 4px 28px;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--accent-soft);
      border: 1px solid rgba(249,115,22,0.28);
      border-radius: 999px;
      background: rgba(249,115,22,0.10);
    }
    .hero h1 {
      margin-top: 18px;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 1px;
    }
    .hero p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 760px;
    }

    .overview {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 16px;
      margin-bottom: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .summary-card {
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .summary-main {
      min-width: 0;
    }
    .summary-value {
      font-size: clamp(34px, 5vw, 48px);
      font-weight: 900;
      line-height: 1;
      color: var(--accent-soft);
    }
    .summary-value.good { color: var(--green); }
    .summary-value.warn { color: var(--yellow); }
    .summary-value.bad { color: var(--red); }
    .summary-label {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .8px;
    }
    .summary-side {
      text-align: right;
      flex-shrink: 0;
    }
    .summary-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .summary-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 0 rgba(142,160,184,0.45);
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    .dot.red { background: var(--red); box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    .dot.yellow { background: var(--yellow); box-shadow: 0 0 0 0 rgba(245,158,11,0.5); }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: .86; }
      50% { transform: scale(1.16); opacity: 1; }
    }

    .status-card {
      padding: 22px 24px;
      display: grid;
      gap: 10px;
    }
    .status-card-title {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .status-card-value {
      font-size: 20px;
      font-weight: 800;
    }
    .status-card-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .toolbar-label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }
    .range-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
    }
    .range-btn.active,
    .range-btn:hover {
      border-color: rgba(249,115,22,0.42);
      background: rgba(249,115,22,0.14);
      color: var(--accent-soft);
    }
    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .countdown-track {
      width: 86px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-soft));
      transition: width 1s linear;
    }

    .section-title {
      margin: 10px 0 14px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .group-block {
      margin-bottom: 20px;
    }
    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 6px;
    }
    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .group-mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-mark.online { background: var(--green); box-shadow: 0 0 14px rgba(34,197,94,0.5); }
    .group-mark.offline { background: var(--red); box-shadow: 0 0 14px rgba(239,68,68,0.5); }
    .group-mark.unknown { background: var(--yellow); box-shadow: 0 0 14px rgba(245,158,11,0.45); }
    .group-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .4px;
    }
    .group-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      display: grid;
      grid-template-columns: 210px 190px 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      box-shadow: var(--shadow);
    }
    .card.online { background: linear-gradient(110deg, rgba(34,197,94,0.06), var(--panel-2) 28%); }
    .card.offline { background: linear-gradient(110deg, rgba(239,68,68,0.08), var(--panel-2) 28%); }
    .card.unknown { background: linear-gradient(110deg, rgba(245,158,11,0.08), var(--panel-2) 28%); }

    .card-name {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }
    .card-subtitle {
      margin-top: 4px;
      font-size: 11px;
      color: #d5deea;
    }
    .card-meta {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .card-msg {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }
    .badge.online { background: rgba(34,197,94,0.14); color: #86efac; }
    .badge.offline { background: rgba(239,68,68,0.14); color: #fca5a5; }
    .badge.unknown { background: rgba(245,158,11,0.14); color: #fcd34d; }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .metrics {
      display: flex;
      gap: 8px;
    }
    .metric {
      flex: 1;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      padding: 10px 12px;
    }
    .metric-val {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
    }
    .metric-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
    }
    .good { color: var(--green); }
    .warn { color: var(--yellow); }
    .bad { color: var(--red); }

    .history-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--muted);
    }
    .history-pct {
      font-size: 11px;
      font-weight: 800;
    }
    .history-blocks {
      display: flex;
      gap: 2px;
      align-items: center;
      height: 20px;
    }
    .hb {
      flex: 1;
      height: 20px;
      border-radius: 3px;
      min-width: 3px;
      position: relative;
    }
    .hb.empty { background: rgba(255,255,255,0.04); }
    .hb::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 7px);
      transform: translateX(-50%);
      background: #111827;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
      z-index: 20;
    }
    .hb:hover::after { opacity: 1; }

    .empty-state,
    .error-screen,
    .loading-screen {
      min-height: 64vh;
      display: grid;
      place-items: center;
    }
    .error-card,
    .loading-card {
      width: min(720px, 100%);
      padding: 36px 28px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(10, 16, 28, 0.9);
      text-align: center;
      box-shadow: var(--shadow);
    }
    .error-code {
      font-size: clamp(72px, 11vw, 120px);
      font-weight: 900;
      line-height: .92;
      color: rgba(239,68,68,0.92);
      letter-spacing: 2px;
    }
    .error-title,
    .loading-title {
      margin-top: 14px;
      font-size: 24px;
      font-weight: 900;
    }
    .error-desc,
    .loading-desc {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .error-meta {
      margin-top: 14px;
      color: #fca5a5;
      font-size: 12px;
      line-height: 1.7;
    }
    .retry-btn {
      margin-top: 18px;
      border: 1px solid rgba(249,115,22,0.36);
      background: rgba(249,115,22,0.12);
      color: var(--accent-soft);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .retry-btn:hover {
      background: rgba(249,115,22,0.18);
    }

    .hidden { display: none !important; }

    @media (max-width: 860px) {
      .overview {
        grid-template-columns: 1fr;
      }
      .card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .shell {
        width: min(100% - 24px, 1100px);
        padding-top: 28px;
      }
      .summary-card,
      .status-card {
        padding: 18px;
      }
      .summary-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .summary-side {
        text-align: left;
      }
      .toolbar {
        flex-wrap: wrap;
      }
      .toolbar-right {
        width: 100%;
        justify-content: flex-end;
      }
      .group-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .history-blocks {
        height: 18px;
      }
      .hb {
        height: 18px;
      }
      .hb::after {
        top: calc(100% + 7px);
        bottom: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-tag">WHITEFOX STATIC STATUS</div>
      <h1>服务运行状态</h1>
      <p>纯前端静态页面，通过当前站点下的代理接口拉取状态数据。接口不可访问时会直接显示全局 404 服务器异常提示。</p>
    </header>

    <section class="loading-screen" id="loadingScreen">
      <div class="loading-card">
        <div class="loading-title">正在连接状态接口</div>
        <div class="loading-desc">页面正在尝试读取远程 API 数据，请稍候。</div>
      </div>
    </section>

    <section class="error-screen hidden" id="errorScreen">
      <div class="error-card">
        <div class="error-code">404</div>
        <div class="error-title">全局服务器异常</div>
        <div class="error-desc">当前无法访问服务状态接口，页面无法获取任何实时数据。</div>
        <div class="error-meta" id="errorMeta">API Endpoint Unreachable</div>
        <button class="retry-btn" id="retryBtn" type="button">重新连接</button>
      </div>
    </section>

    <main class="hidden" id="app">
      <section class="overview">
        <div class="panel summary-card">
          <div class="summary-main">
            <div class="summary-value" id="ovUptime">--%</div>
            <div class="summary-label">整体可用率 · <span id="ovPeriod">近 24 小时</span> · 综合在线状态</div>
          </div>
          <div class="summary-side">
            <div class="summary-status">
              <span class="dot" id="summaryDot"></span>
              <span id="summaryText">检测中</span>
            </div>
            <div class="summary-meta" id="summaryMeta">-- / -- 在线</div>
          </div>
        </div>
        <div class="panel status-card">
          <div class="status-card-title">状态请求</div>
          <div class="status-card-value" id="apiHostValue">检测中</div>
          <div class="status-card-note" id="apiStateText">最近一次请求状态未知</div>
        </div>
      </section>

      <div class="toolbar">
        <span class="toolbar-label">时间范围</span>
        <button class="range-btn active" data-range="24h" type="button">24 小时</button>
        <button class="range-btn" data-range="7d" type="button">7 天</button>
        <button class="range-btn" data-range="30d" type="button">30 天</button>
        <div class="toolbar-right">
          <div class="countdown-track">
            <div class="countdown-fill" id="countdownFill" style="width:100%"></div>
          </div>
          <span id="countdownLabel">-- 秒</span>
        </div>
      </div>

      <div class="section-title">服务分组</div>
      <div id="grid"></div>
    </main>
  </div>

  <script>
    const API_URL = '/api/status';
    const RANGE_SEC = { '24h': 86400, '7d': 604800, '30d': 2592000 };
    const RANGE_LABEL = { '24h': '近 24 小时', '7d': '近 7 天', '30d': '近 30 天' };
    const TYPE_LABELS = {
      http: 'HTTP',
      tcp: 'TCP',
      ping: 'PING',
      mysql: 'MySQL',
      napcat_qq: 'NapCat QQ',
    };
    const SLOTS = window.innerWidth <= 600 ? 30 : 40;

    let rangeKey = '24h';
    let allData = [];
    let fetching = false;
    let countdown = 120;
    let intervalSec = 120;
    let lastRefreshedAt = 0;

    function uptimeClass(p) {
      if (p >= 95) return 'good';
      if (p >= 80) return 'warn';
      return 'bad';
    }

    function groupStatus(list) {
      if (!list.length) return 'unknown';
      if (list.some(s => s.status === 'offline')) return 'offline';
      if (list.every(s => s.status === 'online')) return 'online';
      return 'unknown';
    }

    function groupServices(list) {
      const groups = [];
      const seen = new Map();
      list.forEach(s => {
        const name = (s.group || '未分组').trim() || '未分组';
        if (!seen.has(name)) {
          const group = { name, services: [] };
          seen.set(name, group);
          groups.push(group);
        }
        seen.get(name).services.push(s);
      });
      return groups;
    }

    function filterHistory(hist, rangeSec) {
      if (!hist || !hist.length) return [];
      const cutoff = Math.floor(Date.now() / 1000) - rangeSec;
      const filtered = hist.filter(h => h.ts >= cutoff);
      if (filtered.length <= SLOTS) return filtered;
      const step = filtered.length / SLOTS;
      return Array.from({ length: SLOTS }, (_, i) => filtered[Math.min(filtered.length - 1, Math.round(i * step))]);
    }

    function calcUptime(hist) {
      if (!hist.length) return null;
      return hist.filter(h => h.status === 'online').length / hist.length * 100;
    }

    function histColor(h) {
      if (h.status === 'offline') return 'rgba(239,68,68,0.9)';
      if (h.status === 'unknown') return 'rgba(245,158,11,0.9)';
      if ((h.response_time || 0) <= 300) return 'rgba(34,197,94,0.95)';
      if ((h.response_time || 0) <= 800) return 'rgba(132,204,22,0.92)';
      if ((h.response_time || 0) <= 1500) return 'rgba(245,158,11,0.92)';
      return 'rgba(249,115,22,0.92)';
    }

    function responseMetricClass(status, ms) {
      if (status === 'offline') return 'bad';
      if (status === 'unknown') return 'warn';
      if (!ms || ms <= 300) return 'good';
      if (ms <= 900) return 'warn';
      return 'bad';
    }

    function renderCard(s, rangeSec) {
      const st = s.status || 'unknown';
      const badgeTx = { online: '在线', offline: '离线', unknown: '降级' }[st] || '未知';
      const rt = s.response_time || 0;
      const rtTx = rt > 0 ? `${rt} ms` : '--';
      const hist = filterHistory(s.history || [], rangeSec);
      const uptime = calcUptime(hist);
      const uptimeTx = uptime != null ? `${uptime.toFixed(1)}%` : '--';
      const uptimeCls = uptime != null ? uptimeClass(uptime) : '';
      const pad = Math.max(0, SLOTS - hist.length);
      const blocks = [
        ...Array(pad).fill('<div class="hb empty"></div>'),
        ...hist.map(h => {
          const label = { online: '在线', offline: '离线', unknown: '降级' }[h.status] || '未知';
          const tip = `${label} · ${h.time} · ${h.response_time > 0 ? `${h.response_time}ms` : '--'}`;
          return `<div class="hb" style="background:${histColor(h)}" data-tip="${tip}"></div>`;
        })
      ].join('');
      const t0 = hist.length > 0 ? hist[0].time : '';
      const t1 = hist.length > 0 ? hist[hist.length - 1].time : '最新';

      return `
        <article class="card ${st}">
          <div>
            <div class="card-name">${s.name || '--'}</div>
            ${s.subtitle ? `<div class="card-subtitle">${s.subtitle}</div>` : ''}
            <div class="card-meta">${TYPE_LABELS[s.type] || s.type || 'UNKNOWN'} · ${s.checked_at || '--'}</div>
            ${s.message ? `<div class="card-msg">· ${s.message}</div>` : ''}
          </div>
          <div>
            <div class="badge ${st}"><span class="badge-dot"></span>${badgeTx}</div>
            <div class="metrics" style="margin-top:10px">
              <div class="metric">
                <div class="metric-val ${responseMetricClass(st, rt)}">${rtTx}</div>
                <div class="metric-label">响应延迟</div>
              </div>
              <div class="metric">
                <div class="metric-val ${uptimeCls}">${uptimeTx}</div>
                <div class="metric-label">可用率</div>
              </div>
            </div>
          </div>
          <div>
            <div class="history-top">
              <span>${t0}</span>
              <span class="history-pct ${uptimeCls}">${uptimeTx}</span>
              <span>${t1}</span>
            </div>
            <div class="history-blocks">${blocks}</div>
          </div>
        </article>`;
    }

    function renderGroups(list) {
      const rangeSec = RANGE_SEC[rangeKey];
      const groups = groupServices(list);
      document.getElementById('grid').innerHTML = groups.map(group => {
        const total = group.services.length;
        const online = group.services.filter(s => s.status === 'online').length;
        const issues = group.services.filter(s => s.status !== 'online').length;
        const meta = issues === 0
          ? `${online} / ${total} 在线`
          : `${online} / ${total} 在线 · ${issues} 项需关注`;

        return `
          <section class="group-block">
            <div class="group-head">
              <div class="group-title">
                <span class="group-mark ${groupStatus(group.services)}"></span>
                <span class="group-name">${group.name}</span>
              </div>
              <div class="group-meta">${meta}</div>
            </div>
            <div class="group-list">
              ${group.services.map(s => renderCard(s, rangeSec)).join('')}
            </div>
          </section>`;
      }).join('');
    }

    function updateOverall(list, refreshedAt) {
      const rangeSec = RANGE_SEC[rangeKey];
      const total = list.length;
      const online = list.filter(s => s.status === 'online').length;
      const offline = list.filter(s => s.status === 'offline').length;
      const uptimes = list.map(s => calcUptime(filterHistory(s.history || [], rangeSec))).filter(v => v != null);
      const avg = uptimes.length ? uptimes.reduce((a, b) => a + b, 0) / uptimes.length : null;

      const uptimeEl = document.getElementById('ovUptime');
      uptimeEl.textContent = avg != null ? `${avg.toFixed(2)}%` : '--%';
      uptimeEl.className = 'summary-value' + (avg != null ? ` ${uptimeClass(avg)}` : '');
      document.getElementById('ovPeriod').textContent = RANGE_LABEL[rangeKey];

      const dot = document.getElementById('summaryDot');
      dot.className = 'dot ' + (offline > 0 ? 'red' : online === total ? 'green' : 'yellow');
      document.getElementById('summaryText').textContent = offline > 0 ? `${offline} 个异常` : '全部正常';
      document.getElementById('summaryMeta').textContent = `${online} / ${total} 在线`;

      document.getElementById('apiHostValue').textContent = '请求正常';
      document.getElementById('apiHostValue').className = 'status-card-value good';
      const refreshedText = refreshedAt
        ? new Date(refreshedAt * 1000).toLocaleString('zh-CN', { hour12: false })
        : '未知';
      document.getElementById('apiStateText').textContent = `最近一次成功刷新：${refreshedText}`;
    }

    function showError(message) {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('app').classList.add('hidden');
      document.getElementById('apiHostValue').textContent = '请求异常';
      document.getElementById('apiHostValue').className = 'status-card-value bad';
      document.getElementById('apiStateText').textContent = `最近一次请求失败：${message}`;
      document.getElementById('errorMeta').textContent = message;
      document.getElementById('errorScreen').classList.remove('hidden');
    }

    function showApp() {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('errorScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    async function fetchStatus() {
      if (fetching) return;
      fetching = true;

      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);
        const resp = await fetch(API_URL, {
          method: 'GET',
          mode: 'cors',
          cache: 'no-store',
          signal: controller.signal,
        });
        clearTimeout(timer);

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();
        if (!data || !Array.isArray(data.services)) {
          throw new Error('API 数据格式异常');
        }

        intervalSec = data.interval || 120;
        const elapsed = Math.floor(Date.now() / 1000) - (data.refreshed_at || 0);
        countdown = Math.max(5, intervalSec - elapsed);
        allData = data.services;
        lastRefreshedAt = data.refreshed_at || 0;

        renderGroups(allData);
        updateOverall(allData, lastRefreshedAt);
        showApp();
      } catch (err) {
        const message = err && err.name === 'AbortError'
          ? '请求超时'
          : (err && err.message ? err.message : '无法访问 API');
        showError(message);
      } finally {
        fetching = false;
      }
    }

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        rangeKey = btn.dataset.range;
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (allData.length) {
          renderGroups(allData);
          updateOverall(allData, lastRefreshedAt);
        }
      });
    });

    document.getElementById('retryBtn').addEventListener('click', () => {
      document.getElementById('errorScreen').classList.add('hidden');
      document.getElementById('loadingScreen').classList.remove('hidden');
      fetchStatus();
    });

    setInterval(() => {
      if (fetching) return;
      countdown = Math.max(0, countdown - 1);
      document.getElementById('countdownFill').style.width = `${(countdown / intervalSec) * 100}%`;
      document.getElementById('countdownLabel').textContent = countdown > 0 ? `${countdown} 秒` : '刷新中...';
      if (countdown === 0) fetchStatus();
    }, 1000);

    fetchStatus();
  </script>
</body>
</html>
