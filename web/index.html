<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务状态</title>
  <style>
    @import url("https://cdn.jsdelivr.net/npm/fontsource-noto-sans-sc@4.0.0/chinese-simplified.css");
    @import url("https://cdn.jsdelivr.net/npm/fontsource-noto-sans-sc@4.0.0/latin.css");
    @import url("https://fontsapi.zeoseven.com/298/main/result.css");

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #060a10;
      --s1:      #0c1120;
      --s2:      #101828;
      --border:  rgba(255,255,255,0.07);
      --text:    #e2e8f0;
      --muted:   #4b5563;
      --accent:  #f97316;
      --accent2: #fb923c;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
    }

    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══ HEADER ══ */
    .header {
      text-align: center;
      padding: 52px 24px 76px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% -5%, rgba(249,115,22,.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(34,197,94,.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(239,68,68,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent2);
      background: rgba(249,115,22,.12);
      border: 1px solid rgba(249,115,22,.28);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 18px;
      position: relative;
    }
    .header h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 20%, #fed7aa 60%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }
    .header .desc {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      letter-spacing: 1px;
      position: relative;
    }

    /* ══ 整体概览 ══ */
    .overall {
      max-width: 860px;
      margin: -32px auto 0;
      padding: 0 16px;
      position: relative;
      z-index: 20;
    }
    .ov-card {
      background: var(--s1);
      border: 1px solid rgba(249,115,22,.2);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: linear-gradient(135deg, rgba(249,115,22,.09), rgba(249,115,22,.03));
    }
    .ov-icon {
      width: 42px; height: 42px;
      border-radius: 11px;
      background: rgba(249,115,22,.14);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent2);
      flex-shrink: 0;
    }
    .ov-main { flex: 1; }
    .ov-val {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ov-val.good { background: none; -webkit-text-fill-color: var(--green); }
    .ov-val.warn { background: none; -webkit-text-fill-color: var(--yellow); }
    .ov-val.bad  { background: none; -webkit-text-fill-color: var(--red); }
    .ov-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .ov-right { text-align: right; flex-shrink: 0; }
    .ov-status { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
    .ov-status-text { font-size: 13px; font-weight: 600; }
    .ov-meta { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* 呼吸灯 */
    .breath { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .breath.green  { background: var(--green);  animation: b-green  2.4s ease-in-out infinite; }
    .breath.red    { background: var(--red);    animation: b-red    1.6s ease-in-out infinite; }
    .breath.yellow { background: var(--yellow); animation: b-yellow 2.0s ease-in-out infinite; }
    .breath.grey   { background: var(--muted);  animation: b-grey   2.0s ease-in-out infinite; }

    @keyframes b-green  { 0%,100%{box-shadow:0 0 3px 0 rgba(34,197,94,.5); opacity:.8} 50%{box-shadow:0 0 8px 3px rgba(34,197,94,1); opacity:1} }
    @keyframes b-red    { 0%,100%{box-shadow:0 0 3px 0 rgba(239,68,68,.5); opacity:.8} 50%{box-shadow:0 0 8px 3px rgba(239,68,68,1); opacity:1} }
    @keyframes b-yellow { 0%,100%{box-shadow:0 0 3px 0 rgba(245,158,11,.5);opacity:.8} 50%{box-shadow:0 0 8px 3px rgba(245,158,11,1);opacity:1} }
    @keyframes b-grey   { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ══ 工具栏 ══ */
    .toolbar {
      max-width: 860px;
      margin: 16px auto 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-label { font-size: 11px; color: var(--muted); margin-right: 2px; }
    .range-btn {
      font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--s1); color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .range-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .range-btn.active {
      background: rgba(249,115,22,.14);
      border-color: rgba(249,115,22,.4);
      color: var(--accent2);
    }
    .toolbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted);
    }
    .countdown-track {
      width: 72px; height: 2px;
      background: rgba(255,255,255,.05);
      border-radius: 2px; overflow: hidden;
    }
    .countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1s linear;
    }

    /* ══ 分割线 ══ */
    .section-title {
      max-width: 860px;
      margin: 18px auto 0;
      padding: 0 16px;
      font-size: 11px; color: var(--muted); letter-spacing: 1px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ══ 卡片 ══ */
    .grid {
      max-width: 860px;
      margin: 12px auto 0;
      padding: 0 16px 52px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .group-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }
    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px;
    }
    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .group-mark {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-mark.online {
      background: var(--green);
      box-shadow: 0 0 12px rgba(34,197,94,.45);
    }
    .group-mark.offline {
      background: var(--red);
      box-shadow: 0 0 12px rgba(239,68,68,.45);
    }
    .group-mark.unknown {
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(245,158,11,.4);
    }
    .group-mark.loading {
      background: var(--muted);
      box-shadow: 0 0 8px rgba(75,85,99,.28);
    }
    .group-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .group-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .group-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      position: relative;
      display: grid;
      grid-template-columns: 210px 210px 1fr;
      align-items: center;
      gap: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: rgba(249,115,22,.25); }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px; border-radius: 0 3px 3px 0;
    }
    .card.online::before  { background: var(--green);  box-shadow: 0 0 10px rgba(34,197,94,.6); }
    .card.offline::before { background: var(--red);    box-shadow: 0 0 10px rgba(239,68,68,.6); }
    .card.unknown::before { background: var(--yellow); box-shadow: 0 0 10px rgba(245,158,11,.6); }
    .card.loading::before { background: var(--muted); }

    .card.online  { background: linear-gradient(100deg, rgba(34,197,94,.04)  0%, var(--s1) 28%); }
    .card.offline { background: linear-gradient(100deg, rgba(239,68,68,.05)  0%, var(--s1) 28%); }
    .card.unknown { background: linear-gradient(100deg, rgba(245,158,11,.04) 0%, var(--s1) 28%); }

    /* 第一列：名称 */
    .card-info { padding-left: 10px; }
    .card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:3px; }
    .card-title-wrap { min-width:0; flex:1; }
    .card-name {
      display:block;
      font-size:15px;
      line-height:1.22;
      letter-spacing:.3px;
      word-break:break-word;
      font-family:"荆南波波黑", "Noto Sans SC", "PingFang SC", sans-serif;
      font-weight:normal;
    }
    .card-title-sub {
      margin-top:4px;
      font-size:11px;
      line-height:1.25;
      color:#cbd5e1;
      letter-spacing:.3px;
      word-break:break-word;
      font-family:"荆南波波黑", "Noto Sans SC", "PingFang SC", sans-serif;
      font-weight:normal;
      opacity:.92;
    }
    .card-sub  { font-size:11px; color:var(--muted); }
    .card-msg  { font-size:10px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:185px; }

    /* 徽章 */
    .badge {
      font-size:10px; font-weight:600;
      padding:2px 8px; border-radius:20px;
      display:flex; align-items:center; gap:5px; flex-shrink:0;
    }
    .badge .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .badge.online  { background:rgba(34,197,94,.12);  color:#4ade80; }
    .badge.offline { background:rgba(239,68,68,.12);  color:#f87171; }
    .badge.unknown { background:rgba(245,158,11,.12); color:#fcd34d; }
    .badge.loading { background:rgba(75,85,99,.2);    color:var(--muted); }
    .badge.online  .dot { background:var(--green);  animation:b-green  2.4s ease-in-out infinite; }
    .badge.offline .dot { background:var(--red);    animation:b-red    1.6s ease-in-out infinite; }
    .badge.unknown .dot { background:var(--yellow); animation:b-yellow 2.0s ease-in-out infinite; }

    /* 第二列：指标 */
    .card-metrics { display:flex; gap:8px; }
    .metric {
      flex:1; background:var(--s2);
      border:1px solid var(--border);
      border-radius:10px; padding:8px 10px;
    }
    .metric-val   { font-size:15px; font-weight:700; line-height:1; }
    .metric-label { font-size:10px; color:var(--muted); margin-top:3px; }
    .fast   { color: var(--green); }
    .medium { color: var(--yellow); }
    .slow   { color: var(--red); }
    .good   { color: var(--green); }
    .warn   { color: var(--yellow); }
    .bad    { color: var(--red); }

    /* 人数条 */
    .player-bar { margin-top:7px; }
    .player-bar-header { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:3px; }
    .player-bar-header b { color:var(--text); }
    .player-track { height:3px; background:var(--s2); border-radius:3px; overflow:hidden; }
    .player-fill  { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .6s; }
    .player-fill.full { background:linear-gradient(90deg,var(--yellow),var(--red)); }

    /* 第三列：历史 */
    .history-col { min-width:0; }
    .history-top {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:6px;
    }
    .history-time { font-size:10px; color:var(--muted); }
    .history-pct  { font-size:11px; font-weight:700; }
    .history-blocks { display:flex; gap:2px; align-items:center; height:20px; }
    .hb {
      flex:1; height:20px; border-radius:2px;
      cursor:default; position:relative; transition:opacity .15s; min-width:2px;
    }
    .hb:hover { opacity:.65; }
    .hb.empty { background:rgba(255,255,255,.04); }
    .hb::after {
      content: attr(data-tip);
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:#1a2236; border:1px solid rgba(255,255,255,.1);
      color:var(--text); font-size:10px; white-space:nowrap;
      padding:5px 9px; border-radius:7px;
      pointer-events:none; opacity:0; transition:opacity .15s; z-index:999;
    }
    .hb:hover::after { opacity:1; }

    /* 骨架屏 */
    .skeleton {
      background:linear-gradient(90deg, var(--s2) 25%, rgba(255,255,255,.04) 50%, var(--s2) 75%);
      background-size:200% 100%; animation:shimmer 1.6s infinite; border-radius:8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    footer {
      text-align:center; font-size:11px; color:var(--muted);
      padding:0 0 36px; letter-spacing:1px;
    }

    /* ══ 响应式适配 ══ */

    /* 平板 ≤ 860px */
    @media (max-width: 860px) {
      .card { grid-template-columns: 190px 190px 1fr; gap: 12px; }
    }

    /* 手机 ≤ 600px */
    @media (max-width: 600px) {
      .header { padding: 36px 16px 60px; }
      .header h1 { font-size: 22px; letter-spacing: 1px; }
      .header .desc { font-size: 11px; }

      .overall { padding: 0 12px; }
      .ov-card { padding: 14px 16px; gap: 12px; flex-wrap: wrap; }
      .ov-val  { font-size: 22px; }
      .ov-right { width: 100%; display: flex; justify-content: space-between; align-items: center; }
      .ov-meta { margin-top: 0; }

      .toolbar { padding: 0 12px; flex-wrap: wrap; gap: 6px; }
      .toolbar-right { width: 100%; justify-content: flex-end; }

      .section-title { padding: 0 12px; }

      .grid { padding: 0 12px 48px; gap: 8px; }
      .group-head { align-items: flex-start; flex-direction: column; gap: 6px; }
      .group-meta { white-space: normal; }

      /* 卡片改为单列垂直堆叠 */
      .card {
        grid-template-columns: 1fr;
        padding: 14px 14px 12px;
        gap: 10px;
      }
      .card-info { padding-left: 8px; }
      .card-msg  { max-width: 100%; }

      /* 指标行保持两列并排 */
      .card-metrics { gap: 8px; }

      /* 历史色块在手机上显示 30 格足够 */
      .history-blocks { height: 18px; }
      .hb { height: 18px !important; }

      /* tooltip 改为向下弹出避免超出屏幕顶部 */
      .hb::after {
        bottom: auto;
        top: calc(100% + 6px);
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-tag">ICEJADE STATUS</div>
  <h1>服务运行状态</h1>
  <p class="desc">实时监控各项服务的在线状态与响应质量 · 每 2 分钟自动更新</p>
</div>

<!-- 整体概览 -->
<div class="overall">
  <div class="ov-card">
    <div class="ov-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 20h.01M7 20v-4M12 20V10M17 20V4M22 20h.01"/>
      </svg>
    </div>
    <div class="ov-main">
      <div class="ov-val" id="ovUptime">--%</div>
      <div class="ov-label">整体可用率 · <span id="ovPeriod">近 24 小时</span> · 所有服务综合在线率</div>
    </div>
    <div class="ov-right">
      <div class="ov-status">
        <div class="breath grey" id="summaryBreath"></div>
        <span class="ov-status-text" id="summaryText">检测中</span>
      </div>
      <div class="ov-meta" id="summaryMeta">-- / -- 在线</div>
    </div>
  </div>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <span class="toolbar-label">时间范围</span>
  <button class="range-btn active" onclick="setRange(this,'24h')">24 小时</button>
  <button class="range-btn" onclick="setRange(this,'7d')">7 天</button>
  <button class="range-btn" onclick="setRange(this,'30d')">30 天</button>
  <div class="toolbar-right">
    <div class="countdown-track">
      <div class="countdown-fill" id="countdownFill" style="width:100%"></div>
    </div>
    <span id="countdownLabel" style="min-width:48px;text-align:right">-- 秒</span>
  </div>
</div>

<!-- 服务列表 -->
<div class="section-title">服务分组</div>
<div class="grid" id="grid">
  <div class="card loading">
    <div class="card-info">
      <div class="skeleton" style="height:14px;width:55%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:10px;width:38%"></div>
    </div>
    <div class="card-metrics">
      <div class="metric skeleton" style="height:48px"></div>
      <div class="metric skeleton" style="height:48px"></div>
    </div>
    <div class="skeleton" style="height:20px;border-radius:4px"></div>
  </div>
  <div class="card loading">
    <div class="card-info">
      <div class="skeleton" style="height:14px;width:48%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:10px;width:32%"></div>
    </div>
    <div class="card-metrics">
      <div class="metric skeleton" style="height:48px"></div>
      <div class="metric skeleton" style="height:48px"></div>
    </div>
    <div class="skeleton" style="height:20px;border-radius:4px"></div>
  </div>
</div>

<footer>Copyright © <span id="fyear"></span> 冰玉团队 &nbsp;·&nbsp; 数据仅供参考</footer>

<script>
  let INTERVAL  = 120;
  let countdown = INTERVAL;
  let allData   = [];
  let rangeKey  = '24h';

  const RANGE_SEC   = { '24h': 86400, '7d': 604800, '30d': 2592000 };
  const RANGE_LABEL = { '24h': '近 24 小时', '7d': '近 7 天', '30d': '近 30 天' };
  const SLOTS = window.innerWidth <= 600 ? 30 : 40;

  const typeLabels = {
    http: 'HTTP', tcp: 'TCP', ping: 'PING', mysql: 'MySQL', napcat_qq: 'NapCat QQ',
    minecraft_bedrock: 'Minecraft Bedrock',
    minecraft_java: 'Minecraft Java',
  };

  function speedClass(ms) {
    if (!ms || ms <= 0) return '';
    if (ms < 100) return 'fast';
    if (ms < 500) return 'medium';
    return 'slow';
  }
  function uptimeClass(p) {
    if (p >= 95) return 'good';
    if (p >= 80) return 'warn';
    return 'bad';
  }

  function filterHistory(hist, rangeSec) {
    if (!hist || !hist.length) return [];
    const cutoff = Math.floor(Date.now() / 1000) - rangeSec;
    const filtered = hist.filter(h => h.ts >= cutoff);
    if (filtered.length <= SLOTS) return filtered;
    const step = filtered.length / SLOTS;
    return Array.from({length: SLOTS}, (_, i) => filtered[Math.round(i * step)]);
  }

  function calcUptime(hist) {
    if (!hist.length) return null;
    return hist.filter(h => h.status === 'online').length / hist.length * 100;
  }

  // 按响应时间做多段线性插值，映射到颜色
  // stops: [ms门槛, r, g, b, a]
  const RT_STOPS = [
    [   0,  34, 197,  94, 1.00],  // 极快   · 亮绿
    [  50,  34, 197,  94, 0.90],  // 很快   · 绿
    [ 100,  74, 185,  84, 0.85],  // 快      · 中绿
    [ 160, 132, 204,  22, 0.85],  // 偏快   · 黄绿
    [ 250, 234, 179,   8, 0.88],  // 一般   · 黄
    [ 380, 245, 140,   8, 0.88],  // 偏慢   · 黄橙
    [ 550, 249, 115,  22, 0.90],  // 慢      · 橙
    [ 800, 239,  80,  40, 0.90],  // 很慢   · 橙红
    [1200, 239,  68,  68, 0.92],  // 极慢   · 红
  ];

  function lerpColor(ms) {
    if (ms <= RT_STOPS[0][0]) {
      const [, r, g, b, a] = RT_STOPS[0];
      return `rgba(${r},${g},${b},${a})`;
    }
    const last = RT_STOPS[RT_STOPS.length - 1];
    if (ms >= last[0]) {
      const [, r, g, b, a] = last;
      return `rgba(${r},${g},${b},${a})`;
    }
    for (let i = 1; i < RT_STOPS.length; i++) {
      if (ms <= RT_STOPS[i][0]) {
        const [ms0, r0, g0, b0, a0] = RT_STOPS[i - 1];
        const [ms1, r1, g1, b1, a1] = RT_STOPS[i];
        const t = (ms - ms0) / (ms1 - ms0);
        const r = Math.round(r0 + (r1 - r0) * t);
        const g = Math.round(g0 + (g1 - g0) * t);
        const b = Math.round(b0 + (b1 - b0) * t);
        const a = (a0 + (a1 - a0) * t).toFixed(2);
        return `rgba(${r},${g},${b},${a})`;
      }
    }
  }

  function histColor(h) {
    if (h.status === 'offline') return 'rgba(239,68,68,0.85)';
    if (h.status !== 'online')  return 'rgba(245,158,11,0.75)';
    return lerpColor(h.response_time || 0);
  }

  function setRange(btn, key) {
    rangeKey = key;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('ovPeriod').textContent = RANGE_LABEL[key];
    renderAll();
  }

  function renderAll() {
    if (!allData.length) return;
    renderGroups(allData);
    updateOverall(allData);
  }

  function groupServices(list) {
    const groups = [];
    const seen = new Map();
    list.forEach(s => {
      const name = (s.group || '未分组').trim() || '未分组';
      if (!seen.has(name)) {
        const group = { name, services: [] };
        seen.set(name, group);
        groups.push(group);
      }
      seen.get(name).services.push(s);
    });
    return groups;
  }

  function groupStatus(list) {
    if (!list.length) return 'loading';
    if (list.some(s => s.status === 'offline')) return 'offline';
    if (list.every(s => s.status === 'online')) return 'online';
    return 'unknown';
  }

  function renderCard(s, rangeSec) {
    const st      = s.status || 'unknown';
    const rt      = s.response_time || 0;
    const rtTx    = rt > 0 ? rt + ' ms' : '--';
    const badgeTx = { online:'在线', offline:'离线', unknown:'降级' }[st] || '未知';

    const filtHist   = filterHistory(s.history, rangeSec);
    const filtUptime = calcUptime(filtHist);
    const uptimeTx   = filtUptime != null ? filtUptime.toFixed(1) + '%' : '--';
    const uptimeCls  = filtUptime != null ? uptimeClass(filtUptime) : '';

    let playerHtml = '';
    if (s.has_players && st === 'online') {
      const pct = s.player_max > 0 ? Math.min(Math.round(s.player_online / s.player_max * 100), 100) : 0;
      playerHtml = `
        <div class="player-bar">
          <div class="player-bar-header"><span>在线人数</span><span><b>${s.player_online}</b> / ${s.player_max}</span></div>
          <div class="player-track"><div class="player-fill ${pct>=95?'full':''}" style="width:${pct}%"></div></div>
        </div>`;
    }

    const pad    = SLOTS - filtHist.length;
    const blocks = [
      ...Array(pad).fill('<div class="hb empty"></div>'),
      ...filtHist.map(h => {
        const tip = `${h.time}  ${h.response_time > 0 ? h.response_time+'ms' : '--'}`;
        return `<div class="hb" style="background:${histColor(h)}" data-tip="${tip}"></div>`;
      })
    ].join('');

    const t0 = filtHist.length > 0 ? filtHist[0].time : '';
    const t1 = filtHist.length > 0 ? filtHist[filtHist.length-1].time : '';

    return `
      <div class="card ${st}">
        <div class="card-info">
          <div class="card-header">
            <div class="card-title-wrap">
              <span class="card-name">${s.name}</span>
              ${s.subtitle ? `<div class="card-title-sub">${s.subtitle}</div>` : ''}
            </div>
            <span class="badge ${st}"><span class="dot"></span>${badgeTx}</span>
          </div>
          <div class="card-sub">${typeLabels[s.type]||s.type} · ${s.checked_at||'--'}</div>
          ${s.message ? `<div class="card-msg">· ${s.message}</div>` : ''}
        </div>
        <div>
          <div class="card-metrics">
            <div class="metric">
              <div class="metric-val ${speedClass(rt)}">${rtTx}</div>
              <div class="metric-label">响应延迟</div>
            </div>
            <div class="metric">
              <div class="metric-val ${uptimeCls}">${uptimeTx}</div>
              <div class="metric-label">可用率</div>
            </div>
          </div>
          ${playerHtml}
        </div>
        <div class="history-col">
          <div class="history-top">
            <span class="history-time">${t0}</span>
            <span class="history-pct ${uptimeCls}">${uptimeTx}</span>
            <span class="history-time">${t1||'最新'}</span>
          </div>
          <div class="history-blocks">${blocks}</div>
        </div>
      </div>`;
  }

  function renderGroups(list) {
    const rangeSec = RANGE_SEC[rangeKey];
    const groups = groupServices(list);
    document.getElementById('grid').innerHTML = groups.map(group => {
      const total = group.services.length;
      const online = group.services.filter(s => s.status === 'online').length;
      const issues = group.services.filter(s => s.status !== 'online').length;
      const groupState = groupStatus(group.services);
      const meta = issues === 0
        ? `${online} / ${total} 在线`
        : `${online} / ${total} 在线 · ${issues} 项需关注`;

      return `
        <section class="group-block">
          <div class="group-head">
            <div class="group-title">
              <span class="group-mark ${groupState}"></span>
              <span class="group-name">${group.name}</span>
            </div>
            <div class="group-meta">${meta}</div>
          </div>
          <div class="group-list">
            ${group.services.map(s => renderCard(s, rangeSec)).join('')}
          </div>
        </section>`;
    }).join('');
  }

  function updateOverall(list) {
    const rangeSec = RANGE_SEC[rangeKey];
    const total   = list.length;
    const online  = list.filter(s => s.status === 'online').length;
    const offline = list.filter(s => s.status === 'offline').length;

    const uptimes = list
      .map(s => calcUptime(filterHistory(s.history, rangeSec)))
      .filter(v => v != null);
    const avg = uptimes.length
      ? uptimes.reduce((a,b) => a+b, 0) / uptimes.length
      : null;

    const el = document.getElementById('ovUptime');
    el.textContent  = avg != null ? avg.toFixed(2) + '%' : '--%';
    el.className    = 'ov-val' + (avg != null ? ' ' + uptimeClass(avg) : '');

    const dot  = document.getElementById('summaryBreath');
    dot.className  = 'breath ' + (offline > 0 ? 'red' : online === total ? 'green' : 'yellow');
    document.getElementById('summaryText').textContent = offline === 0 ? '全部正常' : `${offline} 个异常`;
    document.getElementById('summaryMeta').textContent = `${online} / ${total} 在线`;
    document.getElementById('ovPeriod').textContent    = RANGE_LABEL[rangeKey];
  }

  let fetching = false;

  function fetchStatus() {
    if (fetching) return;
    fetching = true;
    return fetch('/api/status')
      .then(r => r.json())
      .then(resp => {
        INTERVAL  = resp.interval || 120;
        const elapsed = Math.floor(Date.now() / 1000) - (resp.refreshed_at || 0);
        countdown = Math.max(5, INTERVAL - elapsed);
        allData   = resp.services || [];
        renderAll();
      })
      .catch(() => {
        countdown = INTERVAL;
        document.getElementById('summaryText').textContent = '获取失败';
      })
      .finally(() => { fetching = false; });
  }

  setInterval(() => {
    if (fetching) return;
    countdown = Math.max(0, countdown - 1);
    document.getElementById('countdownFill').style.width = (countdown / INTERVAL * 100) + '%';
    document.getElementById('countdownLabel').textContent = countdown > 0 ? countdown + ' 秒' : '刷新中...';
    if (countdown === 0) fetchStatus();
  }, 1000);

  document.getElementById('ovPeriod').textContent = RANGE_LABEL[rangeKey];
  document.getElementById('fyear').textContent = new Date().getFullYear();
  fetchStatus();
</script>
</body>
</html>
